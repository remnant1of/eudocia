<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eudocia · Beijing's Very First Interscholastic Magazine</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<meta name="description" content="Eudocia — Beijing's first-ever interscholastic magazine. Boundary-crossing literature from young writers across Beijing's international schools. Established 2019." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    /* ---- Soft Byzantine Glow ---- */
    --sapphire:#4a6fa5;
    --sapphire-deep:#33517d;
    --sapphire-bright:#6f97c8;
    --sapphire-soft:#e9f0f8;
    --gold:#b3954f;
    --gold-bright:#cbb075;
    --gold-soft:#f0e7d2;
    --lavender:#9a8cbf;
    --lavender-soft:#efeaf6;
    --ivory:#faf6ec;
    --card:#fffdf7;
    --ink:#312b3d;
    --ink-soft:#5f586e;
    --muted:#948da2;
    --line:#eae2d4;
    --maxw:1200px;
    --shadow:0 18px 44px -26px rgba(74,111,165,.55);
    --shadow-soft:0 10px 30px -20px rgba(74,111,165,.4);
  }
  [data-theme="dark"]{
    --sapphire:#8fb0dd;--sapphire-deep:#0f1626;--sapphire-bright:#a8c4e8;--sapphire-soft:#1c2740;
    --gold:#d3b878;--gold-bright:#e2ca8f;--gold-soft:#2a2418;
    --lavender:#b6a9d6;--lavender-soft:#241d33;
    --ivory:#12101a;--card:#1a1726;--ink:#ece8f2;--ink-soft:#c3bcd0;--muted:#8f8799;--line:#2b2637;
    --shadow:0 18px 44px -22px rgba(0,0,0,.7);--shadow-soft:0 10px 30px -18px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"EB Garamond","Noto Serif SC",Georgia,serif;color:var(--ink);background:var(--ivory);line-height:1.7;font-size:17px;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
  a{color:inherit;text-decoration:none;cursor:pointer}
  img{max-width:100%;display:block}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
  .display{font-family:"Cormorant Garamond","Noto Serif SC","EB Garamond",serif}
  .ui{font-family:"Jost","Noto Sans SC",system-ui,sans-serif}
  .tbd{color:var(--gold);border-bottom:1px dashed var(--gold);font-style:italic;padding:0 2px}

  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(60vw 50vh at 12% -5%, rgba(154,140,191,.16), transparent 60%),
      radial-gradient(55vw 45vh at 95% 8%, rgba(111,151,200,.14), transparent 60%),
      radial-gradient(50vw 40vh at 80% 100%, rgba(203,176,117,.12), transparent 60%);}

  #progress{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--sapphire),var(--lavender),var(--gold));z-index:200;transition:width .1s}

  /* ---------- top utility bar ---------- */
  .util{background:var(--sapphire-deep);color:#eaf1fa;font-size:12.5px;letter-spacing:.05em}
  .util .wrap{display:flex;justify-content:space-between;align-items:center;height:38px}
  .util .u-left{opacity:.92}
  .util .u-right{display:flex;align-items:center;gap:6px}
  .util .u-right a,.util .u-right button{color:#eaf1fa;padding:6px 10px;border-radius:6px;font-size:12.5px;display:flex;align-items:center;gap:6px;transition:background .2s}
  .util .u-right a:hover,.util .u-right button:hover{background:rgba(255,255,255,.14)}
  .util svg{width:15px;height:15px;fill:currentColor}
  #langBtn{border:1px solid rgba(255,255,255,.28);font-weight:500}
  #langBtn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.7}

  /* ---------- masthead ---------- */
  header.mast{background:var(--card);border-bottom:1px solid var(--line)}
  header.mast .wrap{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:26px 26px 22px}
  .mast .crest{display:flex;align-items:center;gap:12px}
  .mast .crest svg{width:50px;height:50px}
  .mast .crest .motto{font-family:"Jost","Noto Sans SC",sans-serif;font-size:10.5px;letter-spacing:.16em;color:var(--sapphire);line-height:1.5;text-transform:uppercase;font-weight:500}
  .mast .brand{text-align:center;cursor:pointer}
  .mast .brand .name{font-family:"Cormorant Garamond",serif;font-weight:700;font-size:clamp(38px,6vw,62px);color:var(--sapphire);line-height:.95;letter-spacing:.02em}
  .mast .brand .en{font-family:"Jost","Noto Sans SC",sans-serif;font-weight:400;color:var(--gold);font-size:clamp(11px,1.6vw,13.5px);letter-spacing:.28em;text-transform:uppercase;margin-top:8px}
  .mast .est{justify-self:end;text-align:right;font-family:"Jost","Noto Sans SC",sans-serif;font-size:11.5px;letter-spacing:.1em;color:var(--muted);line-height:1.9}
  .mast .est b{color:var(--sapphire);font-weight:600}

  /* ---------- main nav ---------- */
  nav.main{background:var(--sapphire);position:sticky;top:0;z-index:100;box-shadow:0 2px 14px -6px rgba(51,81,125,.5)}
  nav.main .wrap{display:flex;align-items:center;justify-content:center;gap:4px;height:54px}
  nav.main a{font-family:"Jost","Noto Sans SC",sans-serif;color:#fff;font-weight:400;letter-spacing:.22em;font-size:14px;text-transform:uppercase;padding:9px 26px;border-radius:6px;transition:background .2s;white-space:nowrap}
  nav.main a:hover{background:rgba(255,255,255,.15)}
  nav.main a.active{background:rgba(255,255,255,.22);font-weight:600}

  /* ---------- generic ---------- */
  main{min-height:60vh}
  .pagepad{padding:44px 0 64px}
  .crumb{font-family:"Jost","Noto Sans SC",sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:22px}
  .crumb a:hover{color:var(--sapphire)}

  .eyebrow{font-family:"Jost","Noto Sans SC",sans-serif;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:500}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--gold);padding-bottom:12px;margin:0 0 28px;gap:16px;flex-wrap:wrap}
  .sec-head h2{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:34px;font-weight:600;line-height:1.15;color:var(--sapphire-deep)}
  [data-theme="dark"] .sec-head h2{color:var(--ink)}
  .sec-head .more{font-family:"Jost","Noto Sans SC",sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:500}

  .lead{font-size:20px;line-height:1.85;color:var(--ink-soft);max-width:70ch}
  .prose p{margin-bottom:18px;max-width:72ch}

  /* ---------- sub nav ---------- */
  .subnav{position:sticky;top:54px;z-index:80;background:color-mix(in srgb,var(--ivory) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin-bottom:34px}
  .subnav .wrap{display:flex;gap:6px;overflow-x:auto;padding:12px 26px}
  .subnav a{font-family:"Jost","Noto Sans SC",sans-serif;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);padding:8px 16px;border-radius:30px;white-space:nowrap;transition:all .2s}
  .subnav a:hover{background:var(--sapphire-soft);color:var(--sapphire)}
  .subnav a.on{background:var(--sapphire);color:#fff}

  /* ---------- home banner ---------- */
  .banner{position:relative;overflow:hidden;border-radius:18px;padding:64px 44px 58px;text-align:center;margin-bottom:46px;
    background:linear-gradient(135deg,var(--sapphire-soft),var(--lavender-soft) 55%,var(--gold-soft));
    border:1px solid var(--line);box-shadow:var(--shadow-soft)}
  [data-theme="dark"] .banner{background:linear-gradient(135deg,#182238,#241d33 55%,#2a2418)}
  .banner::after{content:"E";position:absolute;right:-40px;bottom:-90px;font-family:"Cormorant Garamond",serif;font-size:360px;font-weight:700;color:var(--sapphire);opacity:.06;line-height:1}
  .banner .eyebrow{position:relative}
  .banner h1{font-family:"Cormorant Garamond",serif;font-size:clamp(46px,8vw,88px);font-weight:700;color:var(--sapphire);line-height:.98;margin:12px 0 6px;position:relative}
  .banner .tag{position:relative;font-family:"Jost","Noto Sans SC",sans-serif;font-size:clamp(13px,2vw,17px);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:400}
  .banner .rule{position:relative;width:90px;height:2px;background:var(--gold);margin:26px auto 20px}
  .banner .info{position:relative;font-family:"Jost","Noto Sans SC",sans-serif;font-size:13px;letter-spacing:.1em;color:var(--muted);display:flex;gap:10px 22px;justify-content:center;flex-wrap:wrap}
  .banner .info b{color:var(--sapphire);font-weight:600}

  /* ---------- cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  .grid.two{grid-template-columns:repeat(2,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .28s,box-shadow .28s}
  .card:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  .card .cap{height:150px;display:flex;align-items:flex-end;padding:16px 18px;position:relative;color:#fff;overflow:hidden}
  .card .cap .glyph{position:absolute;right:14px;top:2px;font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:96px;font-weight:700;color:rgba(255,255,255,.28);line-height:1}
  .card .cap .pill{position:relative;font-family:"Jost","Noto Sans SC",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,255,255,.9);color:var(--sapphire-deep);padding:4px 12px;border-radius:20px;font-weight:600}
  .card .body{padding:20px 22px 22px;display:flex;flex-direction:column;flex:1}
  .card h3{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:24px;font-weight:600;line-height:1.25;color:var(--sapphire-deep)}
  [data-theme="dark"] .card h3{color:var(--ink)}
  .card p{margin-top:8px;font-size:16px;color:var(--ink-soft);flex:1}
  .card .meta{margin-top:16px;font-family:"Jost","Noto Sans SC",sans-serif;font-size:12px;letter-spacing:.06em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .card .go{color:var(--sapphire);font-family:"Jost","Noto Sans SC",sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
  .status{font-family:"Jost","Noto Sans SC",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
  .status.up{color:var(--gold)}
  .status.recap{color:var(--sapphire)}

  .g-sapphire{background:linear-gradient(135deg,#33517d,#6f97c8)}
  .g-lavender{background:linear-gradient(135deg,#6f5f97,#b6a9d6)}
  .g-gold{background:linear-gradient(135deg,#9a7f3f,#cbb075)}
  .g-mix{background:linear-gradient(135deg,#4a6fa5,#9a8cbf 60%,#cbb075)}

  /* ---------- feature strip ---------- */
  .strip{background:linear-gradient(120deg,var(--sapphire-deep),var(--sapphire));color:#fff;border-radius:16px;padding:40px 40px;margin:46px 0;display:grid;grid-template-columns:auto 1fr;gap:30px;align-items:center;box-shadow:var(--shadow-soft)}
  .strip .big{font-family:"Cormorant Garamond",serif;font-size:clamp(52px,9vw,86px);font-weight:700;line-height:.9;color:#fff}
  .strip .big span{color:var(--gold-bright)}
  .strip h3{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:28px;font-weight:600;margin-bottom:8px}
  .strip p{color:#e6ecf6;max-width:62ch;font-size:16px}

  /* ---------- about ---------- */
  .anchor{scroll-margin-top:130px}
  .block{margin-bottom:52px}
  .about-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px;box-shadow:var(--shadow-soft)}
  .about-card p{color:var(--ink-soft);font-size:16px}

  .rate{display:grid;grid-template-columns:auto 1fr;gap:34px;align-items:center;background:var(--card);border:1px solid var(--gold);border-radius:16px;padding:34px 40px;box-shadow:var(--shadow-soft)}
  .rate .num{font-family:"Cormorant Garamond",serif;font-size:clamp(60px,11vw,110px);font-weight:700;color:var(--gold);line-height:.85;text-align:center}
  .rate .num small{display:block;font-family:"Jost","Noto Sans SC",sans-serif;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:8px}
  .rate h3{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:26px;color:var(--sapphire-deep);margin-bottom:8px}
  [data-theme="dark"] .rate h3{color:var(--ink)}
  .rate p{color:var(--ink-soft)}

  .people{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
  .person{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 28px;display:flex;gap:20px;box-shadow:var(--shadow-soft)}
  .person .avatar{flex:0 0 64px;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",serif;font-size:30px;font-weight:700;color:#fff}
  .person h4{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:22px;color:var(--sapphire-deep)}
  [data-theme="dark"] .person h4{color:var(--ink)}
  .person .role{font-family:"Jost","Noto Sans SC",sans-serif;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:2px 0 8px}
  .person p{font-size:15px;color:var(--ink-soft)}
  .note-card{background:var(--lavender-soft);border:1px solid var(--line);border-radius:14px;padding:22px 28px;font-style:italic;color:var(--ink-soft);font-size:16px}
  .note-card b{color:var(--sapphire);font-style:normal}

  .stack{display:grid;gap:16px}
  .item{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--sapphire);border-radius:12px;padding:20px 24px}
  .item.gold{border-left-color:var(--gold)}
  .item.lav{border-left-color:var(--lavender)}
  .item h4{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:21px;color:var(--sapphire-deep);margin-bottom:4px}
  [data-theme="dark"] .item h4{color:var(--ink)}
  .item p{color:var(--ink-soft);font-size:16px}
  .item a.inline{color:var(--sapphire);border-bottom:1px solid var(--sapphire);font-weight:500}

  .contact-box{background:linear-gradient(120deg,var(--sapphire),var(--lavender));color:#fff;border-radius:16px;padding:40px;text-align:center}
  .contact-box h3{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:30px;margin-bottom:8px}
  .contact-box p{color:#eef1f8;font-size:17px}
  .contact-box a.mail{display:inline-block;margin-top:16px;background:#fff;color:var(--sapphire-deep);font-family:"Jost","Noto Sans SC",sans-serif;font-weight:600;letter-spacing:.06em;padding:12px 28px;border-radius:30px;transition:transform .2s}
  .contact-box a.mail:hover{transform:translateY(-2px)}

  /* ---------- issues ---------- */
  .archive{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .issue{position:relative;border-radius:14px;overflow:hidden;color:#fff;padding:26px 24px 22px;min-height:170px;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .28s,box-shadow .28s}
  .issue:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  .issue .yr{position:absolute;right:16px;top:6px;font-family:"Cormorant Garamond",serif;font-size:74px;font-weight:700;color:rgba(255,255,255,.24);line-height:1}
  .issue .season{font-family:"Jost","Noto Sans SC",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.9}
  .issue h4{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:24px;font-weight:600;margin-top:2px}
  .issue .badge{position:absolute;left:16px;top:16px;font-family:"Jost","Noto Sans SC",sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.92);color:var(--sapphire-deep);padding:3px 10px;border-radius:20px;font-weight:600}

  .columns{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
  .column{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px 26px;box-shadow:var(--shadow-soft);transition:transform .25s,box-shadow .25s}
  .column:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .column .tag{font-family:"Jost","Noto Sans SC",sans-serif;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .column h4{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:24px;color:var(--sapphire-deep);margin:4px 0 8px}
  [data-theme="dark"] .column h4{color:var(--ink)}
  .column p{color:var(--ink-soft);font-size:16px}

  .guide{background:var(--sapphire-soft);border:1px solid var(--line);border-radius:16px;padding:34px 38px}
  .guide h3{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:26px;color:var(--sapphire-deep);margin-bottom:6px}
  [data-theme="dark"] .guide h3{color:var(--ink)}
  .guide .rules{display:grid;gap:14px;margin-top:20px}
  .guide .rule-item{display:flex;gap:14px;align-items:flex-start}
  .guide .rule-item .k{flex:0 0 auto;font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1.2;min-width:26px}
  .guide .rule-item b{font-family:"Jost","Noto Sans SC",sans-serif;font-size:14px;letter-spacing:.02em;color:var(--sapphire-deep);display:block}
  [data-theme="dark"] .guide .rule-item b{color:var(--ink)}
  .guide .rule-item span{font-size:15.5px;color:var(--ink-soft)}
  .callout{background:var(--gold-soft);border-radius:10px;padding:14px 18px;margin-top:20px;font-size:15px;color:var(--ink-soft)}
  .callout b{color:var(--gold)}

  /* ---------- partners ---------- */
  .badges{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px}
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .chip{font-family:"Jost","Noto Sans SC",sans-serif;font-size:13px;letter-spacing:.02em;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);padding:8px 15px;border-radius:30px;box-shadow:var(--shadow-soft);transition:transform .2s,border-color .2s}
  .chip:hover{transform:translateY(-2px);border-color:var(--sapphire);color:var(--sapphire)}
  .plat{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:10px 20px;font-family:"Jost","Noto Sans SC",sans-serif;font-size:14px;letter-spacing:.04em;box-shadow:var(--shadow-soft)}
  .plat svg{width:18px;height:18px;fill:var(--sapphire)}
  .plat b{color:var(--sapphire)}
  .partner-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .pnode{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px;text-align:center;box-shadow:var(--shadow-soft)}
  .pnode .ico{width:54px;height:54px;margin:0 auto 12px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:26px;font-weight:700;color:#fff}
  .pnode h4{font-family:"Cormorant Garamond","Noto Serif SC",serif;font-size:21px;color:var(--sapphire-deep)}
  [data-theme="dark"] .pnode h4{color:var(--ink)}
  .pnode p{font-size:15px;color:var(--ink-soft);margin-top:4px}

  /* ---------- forms ---------- */
  .jwrap{max-width:640px}
  .jform{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:32px;display:grid;gap:16px;box-shadow:var(--shadow-soft)}
  .jform .field label{font-family:"Jost","Noto Sans SC",sans-serif;display:block;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:7px;color:var(--ink-soft)}
  .jform .field label .req{color:#c15b4f}
  .jform input,.jform textarea,.jform select{width:100%;border:1.5px solid var(--line);background:var(--ivory);color:var(--ink);border-radius:9px;padding:12px 14px;font-family:"EB Garamond","Noto Serif SC",serif;font-size:16px;outline:none;transition:border-color .2s}
  .jform input:focus,.jform textarea:focus,.jform select:focus{border-color:var(--sapphire)}
  .jform textarea{min-height:96px;resize:vertical}
  .jform .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .jform .err{color:#c15b4f;font-size:12.5px;margin-top:4px;display:none;font-family:"Jost","Noto Sans SC",sans-serif}
  .jform .field.bad input,.jform .field.bad select,.jform .field.bad textarea{border-color:#c15b4f}
  .jform .field.bad .err{display:block}
  .checks{display:flex;flex-wrap:wrap;gap:10px}

/* ---------- Get Involved form ---------- */
function bindJoinForm(){
  const form=$('#joinForm');
  if(!form) return;
  form.addEventListener('submit',e=>{
    e.preventDefault();
    let ok=true;
    const setBad=(sel,bad)=>{ const f=form.querySelector(sel).closest('.field'); f.classList.toggle('bad',bad); if(bad)ok=false; };
    const name=form.name.value.trim(), school=form.school.value.trim(), email=form.email.value.trim();
    const roles=[...form.querySelectorAll('input[name=role]:checked')].map(c=>c.value);
    setBad('[name=name]',!name);
    setBad('[name=school]',!school);
    setBad('[name=email]',!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
    form.querySelector('#roleChecks').closest('.field').classList.toggle('bad',roles.length===0);
    if(roles.length===0) ok=false;
    if(!ok){ toast(L('Please check the highlighted fields','请检查标红的必填项')); return; }

    const subs=store.get('applications',[]);
    subs.push({name,school,email,roles,why:form.why.value.trim(),at:new Date().toISOString()});
    store.set('applications',subs);

    $('#joinWrap').innerHTML=`<div class="success">
      <h3>${L('Application received — thank you! 🎉','申请已提交，谢谢你！🎉')}</h3>
      <p>${L("We'll reach out via",'我们会尽快通过')} <b style="color:#fff">${esc(email)}</b> ${L('soon.','与你联系。')}</p>
      <p style="margin-top:16px"><a class="btn ghost" style="border-color:#fff;color:#fff" onclick="go('/')">${L('Back to Home','返回首页')}</a></p>
    </div>`;
    toast(L('Submitted successfully!','提交成功！'));
  });
}

/* ---------- anchors ---------- */
function scrollToAnchor(id){ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }
function initSubnavSpy(navId){
  const nav=document.getElementById(navId);
  if(!nav) return;
  const links=[...nav.querySelectorAll('a')];
  const spy=()=>{
    let cur=links[0]?.dataset.anchor;
    links.forEach(l=>{ const sec=document.getElementById(l.dataset.anchor); if(sec && sec.getBoundingClientRect().top<=150) cur=l.dataset.anchor; });
    links.forEach(l=>l.classList.toggle('on',l.dataset.anchor===cur));
  };
  spy(); window.addEventListener('scroll',spy,{passive:true});
}

/* ---------- router ---------- */
function router(){
  const raw=decodeURIComponent((location.hash||'').replace(/^#/,'')).replace(/^\//,'');
  const key=raw.indexOf('/')===-1?raw:raw.slice(0,raw.indexOf('/'));
  switch(key){
    case '': renderHome(); break;
    case 'about': renderAbout(); break;
    case 'issues': renderIssues(); break;
    case 'partners': renderPartners(); break;
    default: renderHome();
  }
  document.querySelectorAll('#navLinks a').forEach(el=>el.classList.toggle('active', el.dataset.route===(key||'home')));
  window.scrollTo(0,0);
  $('#progress').style.width='0';
}

/* ---------- theme ---------- */
function initTheme(){
  const saved=store.get('theme', (window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');
  applyTheme(saved);
  $('#themeBtn').addEventListener('click',()=>{
    const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    applyTheme(next); store.set('theme',next);
  });
}
function applyTheme(th){
  document.documentElement.setAttribute('data-theme',th);
  $('#themeLbl').textContent = th==='dark'?L('Light','浅色'):L('Dark','深色');
  $('#themeIcon').innerHTML = th==='dark'
    ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="#eaf1fa" stroke-width="1.6" fill="none"/>'
    : '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>';
}

/* ---------- language ---------- */
function applyLang(l){
  LANG=l; store.set('lang',l);
  document.documentElement.lang = (l==='zh')?'zh-CN':'en';
  document.body.classList.toggle('lang-zh', l==='zh');
  buildNav(); updateMasthead(); updateUtil(); buildFooter(); initDate();
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  $('#themeLbl').textContent = cur==='dark'?L('Light','浅色'):L('Dark','深色');
  router();
}
function initLang(){
  $('#langBtn').addEventListener('click',()=>applyLang(LANG==='en'?'zh':'en'));
}

/* ---------- misc ---------- */
function initScrollUX(){
  const toTop=$('#toTop'), prog=$('#progress');
  toTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  window.addEventListener('scroll',()=>{
    const y=window.scrollY, h=document.documentElement.scrollHeight-window.innerHeight;
    toTop.classList.toggle('show',y>500);
    prog.style.width=(h>0?(y/h*100):0)+'%';
  },{passive:true});
}
function initDate(){
  const d=new Date();
  if(LANG==='zh'){
    const wd=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    $('#utilDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${wd[d.getDay()]} · 北京`;
  }else{
    const wd=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
    $('#utilDate').textContent=`${wd[d.getDay()]}, ${mo[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · Beijing`;
  }
}

/* ---------- boot ---------- */
document.body.classList.toggle('lang-zh', LANG==='zh');
document.documentElement.lang = (LANG==='zh')?'zh-CN':'en';
buildNav(); updateMasthead(); updateUtil(); buildFooter();
initTheme(); initLang(); initScrollUX(); initDate();
window.addEventListener('hashchange',router);
router();
</script>
